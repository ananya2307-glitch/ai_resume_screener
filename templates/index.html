<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Pointing directly to your exact file layout: background.png */
            background-image: url("{{ url_for('static', filename='background.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-x-hidden">

    <div class="relative w-full max-w-2xl my-12">
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/40 p-6 md:p-10 w-full">
            
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center bg-blue-50 text-blue-600 rounded-2xl p-3 mb-4 border border-blue-100">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight mb-2">AI Resume Screener</h1>
                <p class="text-slate-500 font-medium text-sm md:text-base">Upload a candidate profile and query details <span class="text-blue-600 font-semibold">instantly</span>.</p>
            </header>

            <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-5 mb-5">
                <div class="flex items-start gap-4 mb-4">
                    <div class="flex-shrink-0 w-7 h-7 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-sm mt-0.5">1</div>
                    <div>
                        <h2 class="text-base font-bold text-slate-800">Upload Candidate Profile</h2>
                        <p class="text-xs text-slate-400 font-medium">Upload a resume or profile to get started</p>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-1">
                        <input type="file" id="resumeFile" accept=".pdf,.txt" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 bg-white border border-slate-200 rounded-xl p-1.5 focus:outline-none focus:border-blue-400 cursor-pointer">
                    </div>
                    <button id="uploadBtn" onclick="uploadResume()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-5 py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-sm shadow-blue-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Upload & Index
                    </button>
                </div>
                <p class="text-[11px] text-slate-400 font-medium mt-3 px-1">PDF, DOCX, or TXT up to 10MB</p>
                <div id="uploadStatus" class="text-xs font-semibold mt-3 px-1"></div>
            </div>

            <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-5 mb-6">
                <div class="flex items-start gap-4 mb-4">
                    <div class="flex-shrink-0 w-7 h-7 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-sm mt-0.5">2</div>
                    <div>
                        <h2 class="text-base font-bold text-slate-800">Ask Anything About the Candidate</h2>
                        <p class="text-xs text-slate-400 font-medium">Get instant insights and answers powered by AI</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <textarea id="userQuestion" placeholder="e.g., Does this candidate have project management experience? What are their core skills?" class="w-full h-24 p-4 text-sm bg-white border border-slate-200 rounded-xl focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition resize-none placeholder-slate-400 text-slate-700 font-medium"></textarea>
                    </div>
                    <button id="queryBtn" onclick="askAI()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white font-semibold text-sm py-3.5 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-md shadow-blue-200">
                        <span>✨</span> Ask AI Assistant
                    </button>
                </div>
                <div id="queryStatus" class="text-xs font-semibold mt-3 px-1"></div>
                
                <div id="answerBox" class="mt-4 p-4 bg-white border border-slate-100 rounded-xl text-sm leading-relaxed text-slate-700 shadow-inner hidden max-h-60 overflow-y-auto whitespace-pre-line"></div>
            </div>

            <footer class="flex items-center justify-center gap-1.5 text-slate-400 text-[11px] font-semibold tracking-wide">
                <svg class="w-3.5 h-3.5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                <span>Your data is secure and private.</span>
            </footer>

        </div>
    </div>

    <script>
        async function uploadResume() {
            const fileInput = document.getElementById('resumeFile');
            const statusDiv = document.getElementById('uploadStatus');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (fileInput.files.length === 0) {
                statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                statusDiv.innerText = "Please select a candidate file first.";
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            statusDiv.className = "text-xs font-semibold mt-3 px-1 text-slate-500 animate-pulse";
            statusDiv.innerText = "Processing and indexing document chunks...";
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    statusDiv.className = "text-xs font-semibold mt-3 px-1 text-emerald-600";
                    statusDiv.innerText = data.message;
                } else {
                    statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                    statusDiv.innerText = data.error || "Upload validation failed.";
                }
            } catch (err) {
                statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                statusDiv.innerText = "Network transmission error occurred.";
            } finally {
                uploadBtn.disabled = false;
            }
        }

        async function askAI() {
            const questionInput = document.getElementById('userQuestion');
            const statusDiv = document.getElementById('queryStatus');
            const answerBox = document.getElementById('answerBox');
            const queryBtn = document.getElementById('queryBtn');
            
            const question = questionInput.value.trim();
            if (!question) {
                statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                statusDiv.innerText = "Please input a descriptive question.";
                return;
            }

            statusDiv.className = "text-xs font-semibold mt-3 px-1 text-slate-500 animate-pulse";
            statusDiv.innerText = "Querying vector embeddings context from DB...";
            answerBox.classList.add('hidden');
            queryBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerText = "";
                    answerBox.classList.remove('hidden');
                    answerBox.innerText = data.answer;
                } else {
                    statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                    statusDiv.innerText = data.answer || "Retrieval runtime exception.";
                }
            } catch (err) {
                statusDiv.className = "text-xs font-semibold mt-3 px-1 text-red-500";
                statusDiv.innerText = "Error syncing with AI server pipeline.";
            } finally {
                queryBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
